services:
  monprojo-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache openssl && npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/dev.db"
      TMDB_API_KEY: "${TMDB_API_KEY}"
      OMDB_API_KEY: "${OMDB_API_KEY}"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - monprojo-dev-node-modules:/app/node_modules
      - monprojo-dev-data:/app/data
    restart: unless-stopped

volumes:
  monprojo-dev-node-modules:
  monprojo-dev-data:
